<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Gadgets | Contact</title>
    <link rel="stylesheet" href="style.css">
    
    <link rel="preconnect" href="https://app.snipcart.com">
    <link rel="preconnect" href="https://cdn.snipcart.com">
    <link rel="stylesheet" href="https://cdn.snipcart.com/themes/v3.0.31/default/snipcart.css" />
</head>
<body>

    <header>
        <div class="logo">Nexus Gadgets</div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
        <button class="snipcart-checkout yellow-basket">
            🛒 Cart (<span class="snipcart-items-count">0</span>)
        </button>
    </header>

    <main class="contact-container">
        <h1 style="text-align: center; margin-bottom: 40px;">Get in Touch</h1>
        
        <div class="contact-wrapper">
            <div class="contact-info">
                <h2>Contact Details</h2>
                <p>Have a question about our devices? Reach out to us.</p>
                <ul class="info-list">
                    <li><strong>Email:</strong> support@nexusgadgets.com</li>
                    <li><strong>Phone:</strong> +1 (555) 019-8372</li>
                    <li><strong>Address:</strong> 101 Silicon Avenue, Tech District</li>
                </ul>
            </div>

            <div class="contact-form-container">
                <h2>Submit a Review or Feedback</h2>
                <form class="contact-form" onsubmit="event.preventDefault(); alert('Thank you! Your feedback has been submitted successfully.'); this.reset();">
                    <div class="form-group">
                        <label for="name">Your Name</label>
                        <input type="text" id="name" required placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label for="type">Message Type</label>
                        <select id="type">
                            <option value="review">Product Review</option>
                            <option value="feedback">Website Feedback</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="message">Your Message</label>
                        <textarea id="message" rows="5" required placeholder="Write your thoughts here..."></textarea>
                    </div>
                    <button type="submit" class="btn primary-btn" style="width: 100%;">Submit Message</button>
                </form>
            </div>
        </div>
    </main>

    <script async src="https://cdn.snipcart.com/themes/v3.0.31/default/snipcart.js"></script>
    <div hidden id="snipcart" data-api-key="ODQwMzdhNmEtYWU3Ny00MjI5LTlhM2MtNGY4MDAyZmQyNzFiNjM5MDkyNjI5MzI3NDUwMDEy"></div>
    <script src="script.js"></script>
</body>
</html>
